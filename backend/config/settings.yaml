system:
  name: "PipeAI"
  version: "2.0.0"
  debug: false

detector:
  model_path: "models/detector/best.pt"
  device: "cuda:0"
  img_size: 640
  confidence_threshold: 0.5
  half_precision: true

llm:
  default_provider: "cloud"
  default_model: "qwen-vl-max"
  temperature: 0.1
  max_tokens: 4096
  presets:
    - name: "通义千问-VL-Max"
      provider: cloud
      model_name: "qwen-vl-max"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    - name: "通义千问-VL-Plus"
      provider: cloud
      model_name: "qwen-vl-plus"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    - name: "GPT-4o"
      provider: cloud
      model_name: "gpt-4o"
      base_url: "https://api.openai.com/v1"
    - name: "本地模型 (vLLM)"
      provider: local
      model_name: "qwen3-vl-8b-local"
      base_url: "http://localhost:8000/v1"

prior:
  eval_confidence_threshold: 0.85

agent:
  max_retries: 2
  session_timeout_minutes: 30

knowledge_base:
  standard_file: "data/knowledge_base/cjj181_2012.json"

report:
  output_dir: "outputs/reports"
  batch_include_images: true
  disclaimer: "本报告由AI系统自动生成，定位为辅助决策的可解释性评估意见，不替代CJJ 181-2012标准附录D定义的正式检测成果表。"

batch:
  max_concurrent: 3
  retry_on_error: 1

server:
  host: "0.0.0.0"
  port: 8080
  frontend_url: "http://localhost:3000"
